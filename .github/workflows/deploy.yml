name: Deploy to Cloudflare Workers

# Production-ready deployment workflow with security gates
# OWASP ASVS V15.2.2, V15.2.3 Compliance
# SLSA Level 3 Provenance

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel deployments

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  WRANGLER_VERSION: '4.85.0'

# Minimal permissions - expanded per-job as needed
permissions:
  contents: read

jobs:
  # === Pre-Deployment Security Gates ===
  security-gate:
    name: Security Gate - Pre-Deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "deploy-security-gate"

      - name: Security Gate - Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Security Gate - cargo audit
        run: |
          cargo install cargo-audit --version "0.22.1" --locked
          cargo audit --deny warnings

      - name: Security Gate - cargo deny
        run: |
          cargo install cargo-deny --version "0.19.7" --locked
          cargo deny check

      - name: Security Gate - Format check
        run: cargo fmt -- --check

      - name: Security Gate - Unsafe code check
        run: |
          # Look for actual unsafe blocks (unsafe { or unsafe fn) excluding:
          # - forbid(unsafe_code) declarations
          # - 'unsafe-inline' references in CSP comments
          # - SAFETY comments
          UNSAFE_MATCHES=$(grep -rE "unsafe\s*\{|unsafe\s+fn\s|unsafe\s+impl\s" src/ --include="*.rs" 2>/dev/null || true)
          if [ -n "$UNSAFE_MATCHES" ]; then
            # Check if any matches lack SAFETY comments
            echo "$UNSAFE_MATCHES" | while read -r line; do
              if ! echo "$line" | grep -q "// SAFETY:"; then
                echo "$line"
              fi
            done
            echo "❌ Unsafe code without SAFETY comments detected"
            exit 1
          fi
          echo "✅ No unsafe code blocks found (as expected - unsafe_code is forbidden)"

  # === Build and Test ===
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: security-gate
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "deploy-build-test"

      # Note: Native tests skipped - this crate has wasm32-only dependencies
      # (durable_object macros, wasm-bindgen-futures, etc.)
      # Unit tests use proptest which requires native target but worker
      # dependencies only compile on wasm32. Build check verifies compilation.
      - name: Build check
        run: cargo check --all-features

  # === Build WASM Binary, per-environment ===
  #
  # Dual-signal environment gating (dual-signal environment gating):
  # Sandbox builds MUST set BOTH the Cargo feature `sandbox_only_register_test_issuer_client`
  # AND the env var `PROVII_ENV=sandbox`. Production builds MUST omit the feature
  # flag AND set `PROVII_ENV=production`. The build.rs added in compile-time guard panics
  # at compile time if the two signals disagree, preventing a sandbox-only feature from
  # ever shipping to production (defence in depth against a misconfigured workflow).
  #
  # NOTE (W4-S5): the sentinel is `PROVII_ENV`, NOT `CARGO_CFG_PROVII_ENV`. Cargo reserves
  # the `CARGO_CFG_*` namespace for build-script outputs from `--cfg` flags; setting
  # `CARGO_CFG_PROVII_ENV` as a shell env var does NOT propagate through Cargo to the
  # build script. The previous workflow used the wrong name and the guard silently failed
  # to fire. The production-bundle grep (prod-bundle-check.yml) was the only safety net.
  #
  # Wrangler v4 ignores `[env.sandbox.build]` overrides, so the per-env build command must
  # live here in CI rather than in wrangler.toml. Two separate jobs (not a matrix) keeps
  # job outputs unambiguous for the downstream provenance job.
  build-wasm-sandbox:
    name: Build WASM Binary (sandbox)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "deploy-wasm-build-sandbox"

      - name: Install worker-build
        run: cargo install worker-build --version "0.7.5" --locked

      # PROVII_ENV must match Cargo feature flag. build.rs panics at compile
      # time if PROVII_ENV=production AND CARGO_FEATURE_SANDBOX_ONLY_REGISTER_TEST_ISSUER_CLIENT
      # is set. Defence in depth alongside prod-bundle-check.yml.
      # W4-S5: NOT `CARGO_CFG_PROVII_ENV`. Cargo strips `CARGO_CFG_*` shell vars.
      - name: Build WASM (sandbox, release mode)
        env:
          PROVII_ENV: sandbox
        run: worker-build --release -- --features sandbox_only_register_test_issuer_client

      - name: Verify WASM binary integrity
        run: |
          if [ ! -f "build/worker/shim.mjs" ] || [ ! -f "build/index_bg.wasm" ]; then
            echo "❌ WASM build failed - expected outputs not found"
            exit 1
          fi
          WASM_CHECKSUM=$(sha256sum build/index_bg.wasm | awk '{print $1}')
          echo "WASM Binary SHA256 (sandbox): $WASM_CHECKSUM"
          WASM_SIZE=$(stat -c%s build/index_bg.wasm)
          WASM_SIZE_MB=$((WASM_SIZE / 1024 / 1024))
          echo "WASM Binary Size: ${WASM_SIZE_MB}MB"
          if [ $WASM_SIZE -gt 10485760 ]; then
            echo "⚠️  WASM binary is larger than 10MB - may exceed Cloudflare Workers limits"
          fi

      - name: Upload WASM artifact (sandbox)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-binary-sandbox
          path: build/
          retention-days: 7
          if-no-files-found: error

  build-wasm-production:
    name: Build WASM Binary (production)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      wasm_checksum: ${{ steps.verify.outputs.wasm_checksum }}
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          # Pinned (NOT stable): dtolnay/rust-toolchain's explicit `toolchain:`
          # input OVERRIDES rust-toolchain.toml, so a floating `stable` here makes
          # the SHIPPED wasm build with whatever rustc the runner has that week,
          # defeating reproducibility. Keep in lockstep with rust-toolchain.toml.
          toolchain: "1.88.0"
          targets: wasm32-unknown-unknown

      # Cache is skipped on tag pushes because the production wasm artefact
      # built here flows into `sign-artifacts`, `release`, and SLSA
      # provenance. A poisoned cache populated from an earlier branch push
      # could alter the signed binary, so tag builds always rebuild from a
      # clean cache. Non-tag builds (sandbox deploys) reuse the cache.
      - name: Cache cargo dependencies
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "deploy-wasm-build-production"

      - name: Install worker-build
        run: cargo install worker-build --version "0.7.5" --locked

      # PROVII_ENV must match Cargo feature flag. build.rs panics at compile
      # time if PROVII_ENV=production AND CARGO_FEATURE_SANDBOX_ONLY_REGISTER_TEST_ISSUER_CLIENT
      # is set. Defence in depth alongside prod-bundle-check.yml.
      # Production MUST omit --features sandbox_only_register_test_issuer_client.
      # W4-S5: NOT `CARGO_CFG_PROVII_ENV`. Cargo strips `CARGO_CFG_*` shell vars.
      - name: Build WASM (production, release mode)
        env:
          PROVII_ENV: production
        run: worker-build --release

      - name: Verify WASM binary integrity
        id: verify
        run: |
          # worker-build outputs: build/index_bg.wasm (WASM), build/worker/shim.mjs (JS shim)
          if [ ! -f "build/worker/shim.mjs" ]; then
            echo "❌ WASM build failed - shim.mjs not found"
            exit 1
          fi

          if [ ! -f "build/index_bg.wasm" ]; then
            echo "❌ WASM build failed - index_bg.wasm not found"
            exit 1
          fi

          # Calculate WASM binary checksum
          WASM_CHECKSUM=$(sha256sum build/index_bg.wasm | awk '{print $1}')
          echo "WASM Binary SHA256: $WASM_CHECKSUM"
          echo "wasm_checksum=$WASM_CHECKSUM" >> $GITHUB_OUTPUT

          # Check WASM binary size (should be < 10MB for Cloudflare Workers)
          WASM_SIZE=$(stat -c%s build/index_bg.wasm)
          WASM_SIZE_MB=$((WASM_SIZE / 1024 / 1024))
          echo "WASM Binary Size: ${WASM_SIZE_MB}MB"

          if [ $WASM_SIZE -gt 10485760 ]; then
            echo "⚠️  WASM binary is larger than 10MB - may exceed Cloudflare Workers limits"
          fi

      - name: Generate artifact hashes
        id: hash
        run: |
          cd build
          HASHES=$(sha256sum index_bg.wasm index.js worker/shim.mjs | base64 -w0)
          echo "hashes=$HASHES" >> $GITHUB_OUTPUT

      - name: Upload WASM artifact (production)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-binary-production
          path: build/
          retention-days: 7
          if-no-files-found: error

  # === Generate SBOM ===
  # SBOM reflects the production build (the sandbox build carries an extra feature
  # flag but the same dependency graph, so a separate sandbox SBOM would add no value).
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-wasm-production
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          upload-release-assets: false
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # === Sign Artifacts with Cosign ===
  sign-artifacts:
    name: Sign Artifacts
    runs-on: ubuntu-latest
    needs: build-wasm-production
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Sign only the production build. The sandbox build contains the
      # sandbox-only test-issuer registration endpoint and must never be signed
      # as a release artifact.
      - name: Download WASM artifact (production build)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-binary-production
          path: build/

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Create tarball for signing
        run: |
          # Create tarball outside build dir to avoid "file changed as we read it" error
          tar -czvf /tmp/worker.tar.gz -C build .
          mv /tmp/worker.tar.gz build/
          sha256sum build/worker.tar.gz > build/worker.tar.gz.sha256

      - name: Sign with keyless signing
        run: |
          cosign sign-blob --yes \
            --bundle build/worker.tar.gz.cosign-bundle \
            build/worker.tar.gz

      - name: Verify cosign signature
        run: |
          cosign verify-blob \
            --bundle build/worker.tar.gz.cosign-bundle \
            --certificate-identity-regexp '^https://github\.com/provii/provii-verifier/\.github/workflows/deploy\.yml@refs/(heads/main|tags/v.*)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            build/worker.tar.gz

      - name: Generate build attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: build/worker.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-artifacts
          path: |
            build/worker.tar.gz
            build/worker.tar.gz.sha256
            build/worker.tar.gz.cosign-bundle
          retention-days: 90

  # === SLSA Provenance (tags only) ===
  # Must run after release job so the GitHub release exists for asset upload
  provenance:
    needs: [build-wasm-production, release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: read
      id-token: write
      contents: write
    # zizmor: ignore[unpinned-uses]
    # The SLSA generator framework explicitly requires a versioned tag ref
    # (not a SHA) to satisfy SLSA Build Level 3 verifiability. The generator
    # cross-checks the ref against its release tags as part of the provenance
    # flow. SHA-pinning would break that invariant. Documented at:
    #   https://github.com/slsa-framework/slsa-github-generator/blob/main/RENOVATE.md
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      # Provenance covers the production build only; the sandbox build is not a release artifact.
      base64-subjects: "${{ needs.build-wasm-production.outputs.hashes }}"
      upload-assets: true

  # === Cloudflare credentials check ===
  cf-check:
    name: Cloudflare Credentials Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      has_cf_token: ${{ steps.check.outputs.has_cf_token }}
    steps:
      - name: Check for Cloudflare credentials
        id: check
        env:
          HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          echo "has_cf_token=$HAS_TOKEN" >> "$GITHUB_OUTPUT"
          if [[ "$HAS_TOKEN" != "true" ]]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not configured. Deploy steps will be skipped."
          fi

  # === Deploy to Staging ===
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-wasm-sandbox, sbom, cf-check]
    if: |
      needs.cf-check.outputs.has_cf_token == 'true' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'))
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: https://sandbox-verify.provii.app

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Download WASM artifact (sandbox build)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-binary-sandbox
          path: build/

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }} --ignore-scripts

      # The sandbox WASM was built in the build-wasm-sandbox job with
      # PROVII_ENV=sandbox and --features sandbox_only_register_test_issuer_client.
      # wrangler just uploads the pre-built artifact. It does not rebuild.
      - name: Deploy to Staging (Sandbox)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env sandbox

      - name: Verify deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Verify deployment via Cloudflare API (avoids WAF blocking GitHub Actions IPs)
          echo "Verifying deployment via Cloudflare API..."

          # Get latest deployment for the worker
          DEPLOYMENT_STATUS=$(wrangler deployments list --env sandbox 2>&1 | head -5)
          echo "Recent deployments:"
          echo "$DEPLOYMENT_STATUS"

          # Check if the deployment list contains recent entries
          if echo "$DEPLOYMENT_STATUS" | grep -q "Created"; then
            echo "Staging deployment verified via Cloudflare API"
          else
            echo "Could not verify deployment via API, but wrangler deploy succeeded"
          fi

          # Note: Direct health check may return 403 from GitHub Actions due to Cloudflare WAF
          # The deployment itself succeeded if wrangler deploy completed without error

      - name: Smoke test staging
        run: |
          echo "Running smoke tests against staging environment..."
          echo "Note: Tests may fail if Cloudflare WAF blocks GitHub Actions IPs"

          # Test JWKS endpoint
          JWKS_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://sandbox-verify.provii.app/v1/jwks/test || echo "000")

          if [ "$JWKS_RESPONSE" = "302" ] || [ "$JWKS_RESPONSE" = "200" ]; then
            echo "JWKS endpoint smoke test passed"
          elif [ "$JWKS_RESPONSE" = "403" ]; then
            echo "JWKS endpoint returned 403 (likely Cloudflare WAF blocking GitHub Actions)"
            echo "Deployment succeeded - endpoint accessible from regular clients"
          else
            echo "JWKS endpoint returned $JWKS_RESPONSE"
          fi

  # === Deploy to Production ===
  # Conditional accepts a skipped deploy-staging when going straight to
  # production via workflow_dispatch=production. Without `always()` the
  # skipped status of the upstream job propagates and skips this one too,
  # which is why the production gate never fired even though the
  # workflow was dispatched with environment=production.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-wasm-production, deploy-staging, sbom, cf-check]
    if: |
      always() &&
      needs.cf-check.outputs.has_cf_token == 'true' &&
      needs.build-wasm-production.result == 'success' &&
      needs.sbom.result == 'success' &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
      )
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://verify.provii.app

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      - name: Download WASM artifact (production build)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-binary-production
          path: build/

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@${{ env.WRANGLER_VERSION }} --ignore-scripts

      - name: Pre-deployment security check
        run: |
          echo "Running final security checks before production deployment..."

          # Verify WASM binary exists (worker-build outputs to build/index_bg.wasm)
          if [ ! -f "build/index_bg.wasm" ]; then
            echo "❌ WASM binary not found"
            exit 1
          fi

          # Verify no debug symbols in release build
          if strings build/index_bg.wasm | grep -i "debug\|panic" > /dev/null; then
            echo "⚠️  Debug symbols detected in WASM binary"
          fi

          echo "✅ Pre-deployment security checks passed"

      - name: Deploy to Production (exact pre-built artifact, post-deploy gate)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # WS-A: the wrangler [build] command (scripts/wrangler-build.sh) no-ops, so
          # wrangler deploys the signed artifact already downloaded into build/.
          PROVII_SKIP_WORKER_BUILD: "1"
          SIGNED_WASM_SHA256: ${{ needs.build-wasm-production.outputs.wasm_checksum }}
          # "enforce" = roll back + fail on a deployed!=signed mismatch. DEFAULTS to
          # "warn" until validated on a real production tag (the gate's Cloudflare
          # version-content download endpoint + .wasm extraction + whether CF
          # re-optimises the module are unconfirmed). Flip to "enforce" once a tag run
          # shows the download works and the hashes match.
          PROVII_GATE_MODE: enforce
        run: |
          set -uo pipefail
          # Deploy the EXACT pre-built artifact with NO rebuild (PROVII_SKIP_WORKER_BUILD
          # no-ops the [build]). We use `wrangler deploy`, NOT `versions upload`: this
          # worker has Durable Object migrations that versions upload cannot apply
          # (Cloudflare API error 10021). wrangler deploy applies them and ships the
          # exact signed bytes.
          if ! wrangler deploy; then echo "::error::wrangler deploy failed"; exit 1; fi

          # POST-DEPLOY GATE (WS-B): the new version is now live. Download what
          # Cloudflare is serving, hash the .wasm MODULE, compare to the signed hash;
          # on mismatch in enforce mode, roll back to the previous version and fail.
          # (The 0%-pre-traffic gate is unavailable because versions upload can't
          # handle this worker's migrations.)
          WORKER_NAME="production-verify"
          VERSION_ID=$(wrangler deployments list 2>/dev/null | grep -oiE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1 || true)
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "Live version: ${VERSION_ID:-unknown}"
          mkdir -p .deployed-check
          DEPLOYED_SHA="unverified"
          # Download the LIVE deployment's modules (multipart JS+wasm) via the Download
          # Worker endpoint (Bearer + Workers Scripts Edit) and hash the wasm MODULE.
          # VALIDATED in sandbox: CF serves the module byte-identical to the signed
          # artifact. The part body ends with a CRLF before the boundary, hence the -2.
          # A download/extract FAILURE leaves DEPLOYED_SHA=unverified and only warns;
          # only a CONFIRMED hash mismatch rolls back in enforce mode.
          if curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
               -D .deployed-check/headers.txt \
               "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
               -o .deployed-check/content.bin 2>/dev/null; then
            OFF=$(grep -aboP '\x00asm' .deployed-check/content.bin | head -n1 | cut -d: -f1 || true)
            BOUNDARY=$(grep -i '^content-type:' .deployed-check/headers.txt | grep -oiE 'boundary=[^;[:space:]]+' | head -n1 | cut -d= -f2 | tr -d '\r"')
            if [ -n "$OFF" ] && [ -n "$BOUNDARY" ]; then
              tail -c +"$((OFF+1))" .deployed-check/content.bin > .deployed-check/tail.bin
              BOFF=$(grep -aboF -- "--${BOUNDARY}" .deployed-check/tail.bin | head -n1 | cut -d: -f1 || true)
              if [ -n "$BOFF" ] && [ "$BOFF" -gt 2 ]; then
                head -c "$((BOFF-2))" .deployed-check/tail.bin > .deployed-check/deployed.wasm
                DEPLOYED_SHA=$(sha256sum .deployed-check/deployed.wasm | awk '{print $1}')
              fi
            fi
          fi
          if [ "$DEPLOYED_SHA" != "unverified" ]; then
            echo "signed   wasm sha256: $SIGNED_WASM_SHA256"
            echo "deployed wasm sha256: $DEPLOYED_SHA"
            if [ "$DEPLOYED_SHA" != "$SIGNED_WASM_SHA256" ]; then
              if [ "${PROVII_GATE_MODE}" = "enforce" ]; then
                echo "::error::Deployed wasm != signed wasm. Rolling back to the previous version."
                wrangler rollback --yes 2>&1 || echo "::error::rollback failed; investigate immediately"
                exit 1
              fi
              echo "::warning::Deployed wasm != signed wasm (PROVII_GATE_MODE=$PROVII_GATE_MODE, not blocking)."
            else
              echo "OK: deployed wasm matches the signed, attested artifact."
            fi
          else
            echo "::warning::Could not fetch/extract the deployed .wasm (download/extract failed). Proceeding WITHOUT the deployed==signed check for this run."
          fi

          # Emit the deployed-hash record (WS-D publishes + cosign-signs this).
          GATE_OK=$([ "$DEPLOYED_SHA" = "$SIGNED_WASM_SHA256" ] && echo true || echo false)
          printf '{\n  "worker": "provii-verifier",\n  "version_id": "%s",\n  "wasm_sha256": "%s",\n  "signed_sha256": "%s",\n  "gate_verified": %s,\n  "git_sha": "%s",\n  "git_ref": "%s",\n  "run_id": "%s"\n}\n' \
            "$VERSION_ID" "$DEPLOYED_SHA" "$SIGNED_WASM_SHA256" "$GATE_OK" "$GITHUB_SHA" "$GITHUB_REF" "$GITHUB_RUN_ID" > deployed-record.json
          cat deployed-record.json

      - name: Upload deployed-hash record
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployed-record-verifier
          path: deployed-record.json
          if-no-files-found: error

      - name: Publish deployed-hash record to provenance.provii.app (WS-D)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # WS-D: publish the deployed==signed record so third parties can fetch the
          # wasm hash actually serving production. Reuses the existing
          # CLOUDFLARE_API_TOKEN + R2 bucket (same as the issuer + publish-openapi.yml).
          BUCKET="provii-api-specs"  # legacy name: this is the R2 store provenance.provii.app serves from
          wrangler r2 object put \
            "${BUCKET}/provii-verifier/sha/${GITHUB_SHA}/deployed-record.json" \
            --remote --file=deployed-record.json --content-type=application/json
          wrangler r2 object put \
            "${BUCKET}/provii-verifier/latest-deployed.json" \
            --remote --file=deployed-record.json --content-type=application/json
          echo "Published: ${BUCKET}/provii-verifier/{sha/${GITHUB_SHA}/,}deployed-record + latest-deployed.json"

      - name: Smoke test production
        run: |
          echo "Running smoke tests against production environment..."
          echo "Note: Tests may fail if Cloudflare WAF blocks GitHub Actions IPs"

          # Test JWKS endpoint
          JWKS_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://verify.provii.app/v1/jwks/test || echo "000")

          if [ "$JWKS_RESPONSE" = "302" ] || [ "$JWKS_RESPONSE" = "200" ]; then
            echo "✅ JWKS endpoint smoke test passed"
          elif [ "$JWKS_RESPONSE" = "403" ]; then
            echo "⚠️  JWKS endpoint returned 403 (likely Cloudflare WAF blocking GitHub Actions)"
            echo "Deployment succeeded - endpoint accessible from regular clients"
          else
            echo "⚠️  JWKS endpoint returned $JWKS_RESPONSE"
          fi

      - name: Post-deployment monitoring
        run: |
          echo "✅ Production deployment complete. Monitor for 15 minutes:"
          echo "- Cloudflare Analytics: https://dash.cloudflare.com"
          echo "- Error logs: wrangler tail"
          echo "- Rollback command: wrangler rollback"

  # === Create Release (tags only) ===
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-wasm-production, sbom]
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false


      - name: Clone provii-crypto
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto

      - name: Clone provii-audit
        run: git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-audit.git ../provii-audit

      # Release assets are the production build only.
      - name: Download WASM artifact (production build)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-binary-production
          path: dist/

      - name: Download signed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-artifacts
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/index_bg.wasm
            dist/worker.tar.gz
            dist/worker.tar.gz.sha256
            dist/worker.tar.gz.cosign-bundle
            dist/sbom.spdx.json

  # === Deployment Summary ===
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [security-gate, build-and-test, build-wasm-sandbox, build-wasm-production, sbom, cf-check, deploy-staging, deploy-production]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate deployment summary
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          COMMIT_SHA: ${{ github.sha }}
          SECURITY_GATE: ${{ needs.security-gate.result }}
          BUILD_TEST: ${{ needs.build-and-test.result }}
          WASM_SANDBOX: ${{ needs.build-wasm-sandbox.result }}
          WASM_PROD: ${{ needs.build-wasm-production.result }}
          SBOM_RESULT: ${{ needs.sbom.result }}
          STAGING_RESULT: ${{ needs.deploy-staging.result }}
          PROD_RESULT: ${{ needs.deploy-production.result }}
        run: |
          status_icon() { if [ "$1" = "success" ]; then echo "✅ Passed"; elif [ "$1" = "skipped" ]; then echo "⏭️ Skipped"; else echo "❌ Failed"; fi; }
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Gate | $(status_icon "$SECURITY_GATE") |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | $(status_icon "$BUILD_TEST") |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Build (sandbox) | $(status_icon "$WASM_SANDBOX") |" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Build (production) | $(status_icon "$WASM_PROD") |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | $(status_icon "$SBOM_RESULT") |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Deploy | $(status_icon "$STAGING_RESULT") |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Deploy | $(status_icon "$PROD_RESULT") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Features" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Harden-Runner on all jobs" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SHA-pinned actions" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ cargo-audit vulnerability scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ cargo-deny license/supply chain check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM generation" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_TAG" = "true" ]; then
            echo "- ✅ SLSA Level 3 provenance" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Cosign artifact signing" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ SLSA provenance (tags only)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️ Cosign signing (tags only)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $COMMIT_SHA" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: ${{ needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure' }}
        run: |
          echo "Deployment failed. Check logs for details."
          exit 1

      - name: Notify CF token missing
        if: ${{ needs.cf-check.outputs.has_cf_token != 'true' && needs.deploy-staging.result == 'skipped' }}
        run: |
          echo "::notice::Deploy steps skipped: CLOUDFLARE_API_TOKEN is not configured."
