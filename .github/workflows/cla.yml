name: CLA Assistant

# zizmor: ignore[dangerous-triggers]
# `pull_request_target` is required by the contributor-assistant CLA action:
# it must commit signature records to `signatures/cla.json` on the base
# branch, which needs write access to the base repo (denied to a normal
# `pull_request` event from a fork). Mitigations:
#   1. The `if:` guard below blocks Dependabot/Renovate and only runs on
#      the limited event types `[opened, closed, synchronize]`.
#   2. We never check out the PR head ref. Only the CLA action runs, and
#      it operates on its own internal logic against the base branch.
#   3. Permissions are tightened to `contents: write`, `pull-requests: write`,
#      `statuses: write` (no `actions: write`, no broader scopes).
# This is the canonical safe pattern for CLA workflows.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# ADV-VA-028: Reduced to minimum permissions for pull_request_target.
# contents:write is retained because the CLA assistant commits signature
# records to signatures/cla.json on the main branch.
# actions:write was removed (not needed by the CLA action).
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip for Dependabot and Renovate PRs
    if: >-
      github.event_name == 'issue_comment' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.actor != 'renovate[bot]')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: CLA Assistant
        if: >-
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot],tim-maelstrom'
          custom-notsigned-prcomment: >-
            Thank you for your pull request. Before we can review it, you need
            to sign our [Contributor Licence Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).
            Please read the CLA and reply to this comment with the following
            statement to indicate your agreement:


            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
